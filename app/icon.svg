<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="#050505"/>
  <!-- main roof peak -->
  <polyline points="6,36 32,10 58,36" stroke="#f0ebe3" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <!-- left secondary roof -->
  <polyline points="0,40 14,20 19,23" stroke="#f0ebe3" stroke-width="2.4" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <!-- right secondary roof -->
  <polyline points="45,23 50,20 64,40" stroke="#f0ebe3" stroke-width="2.4" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <!-- 2×2 grid of squares -->
  <rect x="25" y="24" width="6" height="6" fill="#f0ebe3"/>
  <rect x="33" y="24" width="6" height="6" fill="#f0ebe3"/>
  <rect x="25" y="32" width="6" height="6" fill="#f0ebe3"/>
  <rect x="33" y="32" width="6" height="6" fill="#f0ebe3"/>
</svg>
